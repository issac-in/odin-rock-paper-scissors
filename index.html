<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Rock Paper Scissors with two game modes - first to five & best of five.">
        <title>Rock Paper Scissors | OVERHAUL WIP</title>
        <link rel="stylesheet" href="./styles.css">
        <script src="./logic.js" defer></script>
    </head>
    <body>
      <header>
        <div class="logo-container">
          <div class="logo">
            <img src="#" alt="rock icon" width="72" height="72">
            <img src="#" alt="paper icon" width="72" height="72">
            <img src="#" alt="scissors icon" width="72" height="72">
          </div>
          <h1 data-cy="header">
            <div class="largeDisplay" data-cy="large-header">Rock, Paper, Scissors!</div>
            <div class="mediumDisplay" data-cy="medium-header">RPS</div>
          </h1>
        </div>
        <img src="#" alt="dark mode icon" id="theme-switch" data-cy="theme-switch">
      </header>
      <main data-cy="main">
        <section>
          <h2>Choose Gamemode</h2>
          <ul class="modeList">
            <li>
              <input type="radio" name="modes" id="first-to" data-cy="first-to-mode">
              <label for="first-to">First to 5 Wins</label>
            </li>
            <li>
              <input type="radio" name="modes" id="best-of" data-cy="best-of-mode">
              <label for="best-of">Best of 5 Rounds</label>
            </li>
          </ul>
        </section>
        <div class="game">
          <button class="playButton" id="play" data-cy="play-button">
            <img src="./assets/icons8-circled-play.svg" alt="play button" width="72" height="72">
          </button>
          <div class="figureContainer" data-cy="game-display">
            <figure>
              <img src="./assets/icons8-account.svg" alt="player icon" width="72" height="72">
              <h3 class="player" id="player-counter" data-cy="player-score">0</h3>
              <p class="player" id="playerOutcomes" data-cy="player-outcomes">• &nbsp;&nbsp; • &nbsp;&nbsp; • &nbsp;&nbsp; •
                &nbsp;&nbsp; • &nbsp;&nbsp;</p>
            </figure>
            <figure>
              <img src="./assets/icons8-monitor.svg" alt="computer icon" width="72" height="72">
              <h3 class="computer" id="computer-counter" data-cy="computer-score">0</h3>
              <p class="computer" id="computerOutcomes" data-cy="computer-outcomes">• &nbsp;&nbsp; • &nbsp;&nbsp; • &nbsp;&nbsp; • &nbsp;&nbsp;
                • &nbsp;&nbsp;</p>
            </figure>
          </div>
          <ul id="choices" data-cy="player-controls">
            <li>
              <button id="rock" data-cy="rock-button" disabled>
                <img src="./assets/icons8-rock.svg" alt="rock button">
              </button>
            </li>
            <li>
              <button id="paper" data-cy="paper-button" disabled>
                <img src="./assets/icons8-sheet-of-paper.svg" alt="paper button">
              </button>
            </li>
            <li>
              <button id="scissors" data-cy="scissors-button" disabled>
                <img src="./assets/icons8-scissors.svg" alt="scissors button">
              </button>
            </li>
          </ul>
        </div>
        <section class="results">
          <h2>Results</h2>
          <p id="outcome" data-cy="results-outcome">Complete a RPS gamemode!</p>
          <button id="reset" data-cy="reset-button">Reset Game</button>
        </section>
      </main>
      <footer data-cy="footer">Copyright &copy; 2022 Issac In</footer>
    </body>
</html>
